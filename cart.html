<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><link rel="stylesheet" href="style.css"><title>السلة</title></head>
<body>
    <header><h1>سلة المشتريات</h1></header>
    <nav>
        <a href="/">الرئيسية</a> <a href="/cart">السلة</a> <a href="/contact">اتصل بنا</a> <a href="/checkout">إتمام الطلب</a>
    </nav>
    <div class="container" id="cart-items"></div>
    <script>
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-items').innerHTML = cart.length ? cart.map(i => `<p>${i.name}</p>`).join('') : 'السلة فارغة';
    </script>
</body>
</html>
