<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر حانوت</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; }
        header { background: #333; color: white; padding: 1rem; }
        .container { padding: 20px; }
        .product { background: white; padding: 15px; margin: 10px; border-radius: 8px; display: inline-block; width: 200px; }
        button { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>متجر حانوت</h1></header>
    <div class="container">
        <h2>منتجاتنا</h2>
        <div class="product">
            <h3>منتج تجريبي</h3>
            <p>السعر: 900 دج</p>
            <button onclick="alert('تمت الإضافة للسلة')">أضف للسلة</button>
        </div>
    </div>
    <footer style="margin-top: 50px;">
        <a href="#">سلة المشتريات</a> | <a href="#">اتصل بنا</a>
    </footer>
</body>
</html>
